services:
  - type: web
    name: realestate-site
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LEADS_FILE
        value: /var/data/leads.ndjson
    disk:
      name: leads-data
      mountPath: /var/data
      sizeGB: 1
